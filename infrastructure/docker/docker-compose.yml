
services:
  optimizer:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    container_name: test-optimizer
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    volumes:
      - ../../data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Add a test runner service
  test-runner:
    image: python:3.11-slim
    container_name: test-runner
    working_dir: /app
    volumes:
      - ../../:/app
    command: python -m pytest tests/ -v
    profiles:
      - test
    depends_on:
      - optimizer

networks:
  default:
    name: test-optimizer-network