---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-optimizer
  namespace: default
  labels:
    app: test-optimizer
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-optimizer
  template:
    metadata:
      labels:
        app: test-optimizer
        version: v1.0.0
    spec:
      containers:
        - name: test-optimizer
          image: test-optimizer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "8000"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: test-optimizer-config
                  key: log_level
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: test-optimizer
  namespace: default
  labels:
    app: test-optimizer
spec:
  type: LoadBalancer
  selector:
    app: test-optimizer
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP