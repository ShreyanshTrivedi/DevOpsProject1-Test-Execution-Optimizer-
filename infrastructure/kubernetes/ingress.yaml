---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-optimizer-ingress
  namespace: default
  labels:
    app: test-optimizer
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - host: test-optimizer.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: test-optimizer-service
                port:
                  number: 8000
  tls:
    - hosts:
        - test-optimizer.local
      secretName: test-optimizer-tls